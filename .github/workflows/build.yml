name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build executable
        run: |
          go build -ldflags "-s -w" -o ciberox-endpoint.exe main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciberox-endpoint
          path: ciberox-endpoint.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ciberox-endpoint
          path: .

      - name: Rename artifact
        run: mv ciberox-endpoint.exe ciberox-endpoint-${{ github.ref_name }}-windows-amd64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ciberox-endpoint-${{ github.ref_name }}-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
